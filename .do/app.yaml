name: triageflow
region: nyc

services:
  - name: frontend
    source_dir: /frontend
    github:
      repo: YOUR_GITHUB_USERNAME/triageflow
      branch: main
      deploy_on_push: true
    build_command: npm run build
    run_command: npm start
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    http_port: 8080
    routes:
      - path: /
    envs:
      - key: BACKEND_URL
        value: ${backend.PRIVATE_URL}
      - key: NEXT_PUBLIC_APP_URL
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}

  - name: backend
    source_dir: /backend
    github:
      repo: YOUR_GITHUB_USERNAME/triageflow
      branch: main
      deploy_on_push: true
    build_command: pip install -r requirements.txt
    run_command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment_slug: python
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    http_port: 8000
    routes:
      - path: /api
    envs:
      - key: DO_INFERENCE_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: YOUR_DO_INFERENCE_KEY
      - key: DO_INFERENCE_BASE_URL
        scope: RUN_AND_BUILD_TIME
        value: https://inference.do-ai.run/v1
      - key: DO_MODEL
        scope: RUN_AND_BUILD_TIME
        value: claude-sonnet-4-6
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${triageflow-db.DATABASE_URL}
      - key: ENVIRONMENT
        scope: RUN_AND_BUILD_TIME
        value: production

databases:
  - name: triageflow-db
    engine: PG
    version: "16"
    size: db-s-dev-database
    num_nodes: 1
